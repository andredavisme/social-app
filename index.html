<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SocialApp</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <nav class="navbar">
    <a href="index.html" class="logo">📸 SocialApp</a>
  </nav>

  <main class="container">
    <!-- Already logged in banner -->
    <div id="alreadyLoggedIn" class="already-logged-in" style="display:none">
      ✅ You're already logged in. Redirecting you to the feed in 3 seconds...
      <a href="feed.html" style="margin-left:8px;color:#1877f2;font-weight:600">Go now →</a>
    </div>

    <div class="auth-box">
      <h2>Welcome to SocialApp</h2>
      <p>Sign in or create an account to get started.</p>

      <div id="authTabs">
        <button class="tab-btn active" onclick="showTab('login')">Login</button>
        <button class="tab-btn" onclick="showTab('signup')">Sign Up</button>
      </div>

      <!-- Login -->
      <div id="loginTab">
        <input type="email" id="loginEmail" placeholder="Email" />
        <input type="password" id="loginPassword" placeholder="Password" />
        <button onclick="login()">Login</button>
        <p id="loginMsg" class="msg"></p>
      </div>

      <!-- Signup -->
      <div id="signupTab" style="display:none">
        <input type="text" id="signupUsername" placeholder="Username (min 3 chars)" />
        <input type="text" id="signupFullName" placeholder="Full Name" />
        <input type="email" id="signupEmail" placeholder="Email" />
        <input type="password" id="signupPassword" placeholder="Password (min 6 chars)" />
        <button onclick="signup()">Create Account</button>
        <p id="signupMsg" class="msg"></p>
      </div>
    </div>
  </main>

  <script type="module" src="js/supabase.js"></script>
  <script type="module" src="js/auth.js"></script>
</body>
</html>
