<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin – SocialApp</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <nav class="navbar">
    <a href="index.html" class="logo">📸 SocialApp</a>
    <div class="nav-links">
      <a href="feed.html">Feed</a>
      <a href="admin.html">Admin</a>
      <button id="logoutBtn">Logout</button>
    </div>
  </nav>

  <main class="container">
    <h2>🛡️ Admin Portal</h2>

    <div class="admin-tabs">
      <button class="tab-btn active" onclick="adminTab('users')">Users</button>
      <button class="tab-btn" onclick="adminTab('posts')">Posts</button>
      <button class="tab-btn" onclick="adminTab('messages')">Messages</button>
    </div>

    <div id="adminUsers">
      <h3>All Users</h3>
      <div id="userList"></div>
    </div>
    <div id="adminPosts" style="display:none">
      <h3>All Posts</h3>
      <div id="postList"></div>
    </div>
    <div id="adminMessages" style="display:none">
      <h3>All Messages</h3>
      <div id="messageList"></div>
    </div>
  </main>

  <script src="js/supabase.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
